{% extends "app_base.html" %}
{% block title %}Edit Reminder – REYDM{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Edit Reminder</h2>
    <p>Update project reminder details</p>
</div>

<div class="card" style="max-width: 560px;">
    <form method="POST" action="{{ url_for('edit_reminder', reminder_id=reminder.id) }}">
        <div class="form-group">
            <label for="project_name">
                <i class="fa-solid fa-folder-open"></i> Project Name
            </label>
            <input type="text" id="project_name" name="project_name" class="form-control"
                   value="{{ reminder.project_name }}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="reminder_date">
                    <i class="fa-solid fa-calendar"></i> Date
                </label>
                <input type="date" id="reminder_date" name="reminder_date" class="form-control"
                       value="{{ reminder.reminder_datetime.strftime('%Y-%m-%d') }}" required>
            </div>
            <div class="form-group">
                <label for="reminder_time">
                    <i class="fa-solid fa-clock"></i> Time
                </label>
                <input type="time" id="reminder_time" name="reminder_time" class="form-control"
                       value="{{ reminder.reminder_datetime.strftime('%H:%M') }}" required>
            </div>
        </div>

        <div class="btn-group" style="margin-top: 8px;">
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-save"></i> Update Reminder
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
